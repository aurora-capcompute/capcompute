// ABI v3: the syscall envelope, protobuf-encoded (CHALLENGE.md E, decided).
// The envelope stays uniform — one message shape for every capability, which
// is what keeps generic interposition (validate, journal, trace) possible —
// and the args/result payloads stay opaque JSON bytes.
//
// This file is the interop source of truth. The Go codec in this package is
// hand-rolled and reflection-free (TinyGo-safe, zero dependencies) and is
// verified against protoc-generated reference code in wire_interop_test.go;
// the Rust brain implements the same messages. Schema evolution rules are
// protobuf's: never reuse a field number, add fields freely — decoders skip
// what they do not know.
syntax = "proto3";

package aurora.sys.v3;

option go_package = "github.com/aurora-capcompute/capcompute/sys/wire/internal/refpb";

// Syscall is the guest-to-host request.
message Syscall {
  uint32 abi = 1;   // must equal 3
  string name = 2;  // capability or reserved sys.* name
  bytes args = 3;   // JSON payload, opaque to the envelope
}

enum Status {
  STATUS_UNSPECIFIED = 0;
  STATUS_RESULT = 1;
  STATUS_YIELD = 2;
  STATUS_FAILED = 3;
}

// Response is the host-to-guest result.
message Response {
  uint32 abi = 1;
  Status status = 2;
  string code = 3;            // errno when status is STATUS_FAILED
  bytes result = 4;           // JSON payload when status is STATUS_RESULT
  string message = 5;         // human text on yield/failure
  repeated string labels = 6; // provenance of the result (sorted)
}
